appId: re.workadventu.desktop

productName: Escritorio Vmix

files:
    - "dist/**/*"
    - "assets/**/*"
    - from: "../local-app/dist/"
      to: "local-app/dist"

directories:
    buildResources: ./resources
    output: ./build

dmg:
    icon: false

mac:
    category: public.app-category.business
    icon: resources/icon.icns
    executableName: Escritorio Vmix
    hardenedRuntime: true
    gatekeeperAssess: false
    entitlements: resources/entitlements.mac.plist
    entitlementsInherit: resources/entitlements.mac.plist
    extendInfo:
        NSMicrophoneUsageDescription: "O Vmix precisa do microfone para chamadas de voz."
        NSCameraUsageDescription: "O Vmix precisa da câmera para chamadas de vídeo."
        NSDesktopFolderUsageDescription: "O Vmix precisa do diretório de trabalho para compartilhar tela."
    artifactName: "${productName}-${version}-${arch}.${ext}"

afterSign: scripts/notarize.js

linux:
    category: "Office"
    packageCategory: "Office"
    maintainer: "Rafael Machado <rfm@franet.com.br>"
    icon: "assets/icons/logo.icns"
    target:
        - AppImage
    artifactName: "${productName}-${version}-${arch}.${ext}"

win:
    icon: "assets/icons/logo-256.png"
    artifactName: "${productName}-${version}-setup.${ext}"

publish:
    provider: github
    owner: lucianoGG
    repo: vmix-escritorio
    releaseType: release
