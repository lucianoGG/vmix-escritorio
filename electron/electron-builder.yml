appId: re.workadventu.desktop

productName: Escritório Vmix

files:
    - "dist/**/*"
    - "assets/**/*"
    - from: "../local-app/dist/"
      to: "local-app/dist"

directories:
    output: ./build

dmg:
    icon: false

linux:
    category: "Office"
    packageCategory: "Office"
    icon: "assets/icons/logo.icns"
    target:
        - AppImage
    artifactName: "${productName}-${version}-${arch}.${ext}"

win:
    icon: "assets/icons/logo-256.png"
    artifactName: "${productName}-${version}-setup.${ext}"

publish:
    provider: github
    owner: lucianoGG
    repo: vmix-escritorio
    releaseType: release
